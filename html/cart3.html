<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f9f9f9;
        }
        .container {
            max-width: 800px;
            margin: 50px auto;
            background: #fff;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        h1 {
            text-align: center;
        }
        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #ddd;
        }
        .cart-item:last-child {
            border-bottom: none;
        }
        .cart-item img {
            width: 50px;
            height: 50px;
            object-fit: cover;
            margin-right: 10px;
        }
        .cart-item-details {
            display: flex;
            align-items: center;
            flex: 1;
        }
        .cart-item-quantity {
            display: flex;
            align-items: center;
        }
        .cart-item-quantity input {
            width: 50px;
            margin: 0 5px;
            text-align: center;
        }
        .remove-btn {
            background-color: #dc3545;
            color: #fff;
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.9em;
        }
        .remove-btn:hover {
            background-color: #c82333;
        }
        .total {
            display: flex;
            justify-content: space-between;
            margin: 20px 0;
            font-weight: bold;
            font-size: 1.2em;
        }
        .checkout-btn {
            display: block;
            width: 100%;
            padding: 10px;
            background-color: #28a745;
            color: #fff;
            text-align: center;
            text-decoration: none;
            border-radius: 5px;
            font-size: 1em;
            font-weight: bold;
            transition: background-color 0.3s;
        }
        .checkout-btn:hover {
            background-color: #218838;
        }
        .error {
            color: red;
            font-size: 0.9em;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Your Cart</h1>

        <div id="cart-items">
            <div class="cart-item" data-price="10">
                <div class="cart-item-details">
                    <img src="https://via.placeholder.com/50" alt="Product 1">
                    <span>Product 1</span>
                </div>
                <div class="cart-item-quantity">
                    <button onclick="updateQuantity(this, -1)">-</button>
                    <input type="number" value="1" min="1" onchange="recalculateTotal()">
                    <button onclick="updateQuantity(this, 1)">+</button>
                </div>
                <span>$10.00</span>
                <button class="remove-btn" onclick="removeItem(this)">Remove</button>
            </div>
            
            <div class="cart-item" data-price="15">
                <div class="cart-item-details">
                    <img src="https://via.placeholder.com/50" alt="Product 2">
                    <span>Product 2</span>
                </div>
                <div class="cart-item-quantity">
                    <button onclick="updateQuantity(this, -1)">-</button>
                    <input type="number" value="1" min="1" onchange="recalculateTotal()">
                    <button onclick="updateQuantity(this, 1)">+</button>
                </div>
                <span>$15.00</span>
                <button class="remove-btn" onclick="removeItem(this)">Remove</button>
            </div>

            <div class="cart-item" data-price="20">
                <div class="cart-item-details">
                    <img src="https://via.placeholder.com/50" alt="Product 3">
                    <span>Product 3</span>
                </div>
                <div class="cart-item-quantity">
                    <button onclick="updateQuantity(this, -1)">-</button>
                    <input type="number" value="1" min="1" onchange="recalculateTotal()">
                    <button onclick="updateQuantity(this, 1)">+</button>
                </div>
                <span>$20.00</span>
                <button class="remove-btn" onclick="removeItem(this)">Remove</button>
            </div>
        </div>

        <div class="total">
            <span>Total Amount:</span>
            <span id="total-amount">$45.00</span>
        </div>

        <button id="checkout-btn" class="checkout-btn">Proceed to Checkout</button>
        <div id="error-message" class="error" style="display: none;">Please add items to your cart before checking out.</div>
    </div>

    <script>
        function updateQuantity(button, change) {
            const input = button.parentElement.querySelector('input');
            const newValue = Math.max(1, parseInt(input.value) + change);
            input.value = newValue;
            recalculateTotal();
        }

        function removeItem(button) {
            button.parentElement.remove();
            recalculateTotal();
        }

        function recalculateTotal() {
            const cartItems = document.querySelectorAll('.cart-item');
            let total = 0;
            cartItems.forEach(item => {
                const price = parseFloat(item.dataset.price);
                const quantity = parseInt(item.querySelector('input').value);
                total += price * quantity;
            });
            document.getElementById('total-amount').textContent = `$${total.toFixed(2)}`;

            const errorMessage = document.getElementById('error-message');
            if (cartItems.length === 0) {
                errorMessage.style.display = 'block';
            } else {
                errorMessage.style.display = 'none';
            }
        }

        document.getElementById('checkout-btn').addEventListener('click', function() {
            const cartItems = document.getElementById('cart-items').children;
            const errorMessage = document.getElementById('error-message');

            if (cartItems.length === 0) {
                errorMessage.style.display = 'block';
            } else {
                errorMessage.style.display = 'none';
                alert('Proceeding to checkout...');
                // Here you can redirect to the checkout page or perform further actions
            }
        });

        recalculateTotal();
    </script>
</body>
</html>
